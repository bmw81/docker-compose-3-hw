services:
  vote:
    image: dockersamples/examplevotingapp_vote:latest
    ports:
      - "5000:80"
    networks:
      - frontend
      - backend
    depends_on:
      - redis

  result:
    image: dockersamples/examplevotingapp_result:latest
    ports:
      - "5001:80"
    networks:
      - frontend
      - backend
    depends_on:
      - db

  worker:
    image: dockersamples/examplevotingapp_worker:latest
    networks:
      - backend
    depends_on:
      - redis
      - db

  redis:
    image: redis:alpine
    networks:
      - backend

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: votes
    networks:
      - backend

networks:
  frontend:   # для пользовательского трафика (голосование + результаты)
  backend:    # для внутреннего общения сервисов
